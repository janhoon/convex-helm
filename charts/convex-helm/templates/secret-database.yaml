{{- if and (ne .Values.database.type "sqlite") (not .Values.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "convex-helm.databaseSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "convex-helm.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if eq .Values.database.type "postgres" }}
  postgres-url: {{ required "database.postgresUrl is required when database.type is postgres" .Values.database.postgresUrl | b64enc | quote }}
  {{- else if eq .Values.database.type "mysql" }}
  mysql-url: {{ required "database.mysqlUrl is required when database.type is mysql" .Values.database.mysqlUrl | b64enc | quote }}
  {{- end }}
{{- end }}
