{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.backend.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "convex-helm.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "convex-helm.backend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.backend.tls }}
  tls:
    {{- toYaml .Values.ingress.backend.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.backend.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "convex-helm.fullname" . }}-backend
                port:
                  name: api
{{- end }}
{{- if .Values.ingress.actions.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "convex-helm.fullname" . }}-actions
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "convex-helm.backend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.actions.tls }}
  tls:
    {{- toYaml .Values.ingress.actions.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.actions.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "convex-helm.fullname" . }}-backend
                port:
                  name: actions
{{- end }}
{{- if and .Values.dashboard.enabled .Values.ingress.dashboard.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "convex-helm.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "convex-helm.dashboard.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.dashboard.tls }}
  tls:
    {{- toYaml .Values.ingress.dashboard.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.dashboard.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "convex-helm.fullname" . }}-dashboard
                port:
                  name: http
{{- end }}
{{- end }}
